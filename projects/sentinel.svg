<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="750" viewBox="0 0 1200 750" fill="none" role="img" aria-label="Sentinel — monitoring dashboard cover art">
  <defs>
    <linearGradient id="se-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0e0e11"/>
      <stop offset="1" stop-color="#050505"/>
    </linearGradient>
    <radialGradient id="se-glow" cx="0.5" cy="0.5" r="0.6">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.14"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="se-area" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <pattern id="se-grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M60 0H0V60" stroke="#ffffff" stroke-opacity="0.045" stroke-width="1" fill="none"/>
    </pattern>
    <linearGradient id="se-fade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#000" stop-opacity="0"/>
      <stop offset="1" stop-color="#000" stop-opacity="0.72"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="750" fill="url(#se-bg)"/>
  <rect width="1200" height="750" fill="url(#se-grid)"/>
  <ellipse cx="600" cy="360" rx="520" ry="330" fill="url(#se-glow)"/>

  <!-- Throughput area chart -->
  <path d="M120 470 L120 402 L206 366 L292 398 L378 300 L464 338 L550 258 L636 296 L722 214 L808 262 L894 196 L980 236 L1066 168 L1080 168 L1080 470 Z" fill="url(#se-area)"/>
  <path d="M120 402 L206 366 L292 398 L378 300 L464 338 L550 258 L636 296 L722 214 L808 262 L894 196 L980 236 L1066 168" stroke="#ffffff" stroke-opacity="0.85" stroke-width="2.5" fill="none" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Sample points -->
  <g fill="#050505" stroke="#ffffff" stroke-width="2">
    <circle cx="378" cy="300" r="5" stroke-opacity="0.5"/>
    <circle cx="722" cy="214" r="5" stroke-opacity="0.5"/>
    <circle cx="1066" cy="168" r="6.5" stroke-opacity="0.95"/>
  </g>
  <circle cx="1066" cy="168" r="16" stroke="#ffffff" stroke-opacity="0.28" fill="none"/>

  <!-- Baseline + threshold -->
  <path d="M120 470 L1080 470" stroke="#ffffff" stroke-opacity="0.2"/>
  <path d="M120 244 L1080 244" stroke="#ffffff" stroke-opacity="0.16" stroke-dasharray="7 8"/>
  <rect x="1092" y="230" width="4" height="28" rx="2" fill="#ffffff" fill-opacity="0.3"/>

  <!-- Event ticks along the baseline -->
  <g fill="#ffffff">
    <rect x="176" y="490" width="3" height="16" rx="1.5" fill-opacity="0.2"/>
    <rect x="268" y="490" width="3" height="26" rx="1.5" fill-opacity="0.32"/>
    <rect x="360" y="490" width="3" height="12" rx="1.5" fill-opacity="0.16"/>
    <rect x="452" y="490" width="3" height="34" rx="1.5" fill-opacity="0.5"/>
    <rect x="544" y="490" width="3" height="18" rx="1.5" fill-opacity="0.22"/>
    <rect x="636" y="490" width="3" height="24" rx="1.5" fill-opacity="0.3"/>
    <rect x="728" y="490" width="3" height="14" rx="1.5" fill-opacity="0.18"/>
    <rect x="820" y="490" width="3" height="30" rx="1.5" fill-opacity="0.42"/>
    <rect x="912" y="490" width="3" height="20" rx="1.5" fill-opacity="0.24"/>
    <rect x="1004" y="490" width="3" height="16" rx="1.5" fill-opacity="0.2"/>
  </g>

  <!-- Status readouts -->
  <g>
    <rect x="120" y="140" width="150" height="56" rx="14" fill="#ffffff" fill-opacity="0.05" stroke="#ffffff" stroke-opacity="0.14"/>
    <circle cx="146" cy="168" r="5" fill="#ffffff" fill-opacity="0.9"/>
    <circle cx="146" cy="168" r="12" stroke="#ffffff" stroke-opacity="0.25" fill="none"/>
    <rect x="166" y="158" width="76" height="7" rx="3.5" fill="#ffffff" fill-opacity="0.4"/>
    <rect x="166" y="173" width="48" height="6" rx="3" fill="#ffffff" fill-opacity="0.18"/>
  </g>

  <rect y="450" width="1200" height="300" fill="url(#se-fade)"/>
</svg>
