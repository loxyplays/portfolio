<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="750" viewBox="0 0 1200 750" fill="none" role="img" aria-label="Halcyon — focus timer cover art">
  <defs>
    <linearGradient id="ha-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f0f12"/>
      <stop offset="1" stop-color="#050505"/>
    </linearGradient>
    <radialGradient id="ha-glow" cx="0.5" cy="0.46" r="0.45">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.2"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ha-ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="0.6" stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.15"/>
    </linearGradient>
    <linearGradient id="ha-fade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#000" stop-opacity="0"/>
      <stop offset="1" stop-color="#000" stop-opacity="0.7"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="750" fill="url(#ha-bg)"/>
  <ellipse cx="600" cy="345" rx="440" ry="330" fill="url(#ha-glow)"/>

  <!-- Concentric ambient rings -->
  <g stroke="#ffffff" fill="none">
    <circle cx="600" cy="345" r="290" stroke-opacity="0.05"/>
    <circle cx="600" cy="345" r="245" stroke-opacity="0.07"/>
    <circle cx="600" cy="345" r="198" stroke-opacity="0.1"/>
  </g>

  <!-- Timer track -->
  <circle cx="600" cy="345" r="158" stroke="#ffffff" stroke-opacity="0.1" stroke-width="14" fill="none"/>

  <!-- Progress arc, ~68% — starts at 12 o'clock, sweeps clockwise -->
  <path d="M600 187 A158 158 0 1 1 452 400" stroke="url(#ha-ring)" stroke-width="14" stroke-linecap="round" fill="none"/>

  <!-- Arc head -->
  <circle cx="452" cy="400" r="11" fill="#ffffff" fill-opacity="0.2"/>
  <circle cx="452" cy="400" r="6" fill="#ffffff"/>

  <!-- Tick marks every 30 degrees -->
  <g stroke="#ffffff" stroke-opacity="0.3" stroke-width="2.5" stroke-linecap="round">
    <path d="M600 155 L600 141"/>
    <path d="M695 168 L702 156"/>
    <path d="M772 222 L783 212"/>
    <path d="M790 345 L804 345"/>
    <path d="M772 468 L783 478"/>
    <path d="M695 522 L702 534"/>
    <path d="M600 535 L600 549"/>
    <path d="M505 522 L498 534"/>
    <path d="M428 468 L417 478"/>
    <path d="M410 345 L396 345"/>
    <path d="M428 222 L417 212"/>
    <path d="M505 168 L498 156"/>
  </g>

  <!-- Countdown readout -->
  <g fill="#ffffff">
    <rect x="516" y="322" width="60" height="12" rx="6" fill-opacity="0.9"/>
    <rect x="588" y="322" width="12" height="12" rx="6" fill-opacity="0.4"/>
    <rect x="612" y="322" width="60" height="12" rx="6" fill-opacity="0.9"/>
    <rect x="546" y="356" width="108" height="7" rx="3.5" fill-opacity="0.2"/>
  </g>

  <!-- Offline-sync indicator -->
  <g>
    <rect x="510" y="576" width="180" height="44" rx="22" fill="#ffffff" fill-opacity="0.05" stroke="#ffffff" stroke-opacity="0.14"/>
    <circle cx="538" cy="598" r="5" fill="#ffffff" fill-opacity="0.85"/>
    <rect x="556" y="594" width="106" height="7" rx="3.5" fill="#ffffff" fill-opacity="0.25"/>
  </g>

  <rect y="450" width="1200" height="300" fill="url(#ha-fade)"/>
</svg>
